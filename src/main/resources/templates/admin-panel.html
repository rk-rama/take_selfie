<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyber Admin - Control Center</title>
  <style>
    body { background: #050505; color: white; font-family: 'Ubuntu', sans-serif; padding: 40px; }
    .admin-container { width: 95%; max-width: 1200px; margin: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #111; border: 1px solid #333; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
    th { color: #00d4ff; text-transform: uppercase; letter-spacing: 1px; }
    .user-row:hover { background: #1a1a1a; }
    .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; background: #222; color: #ff0055; border: 1px solid #ff0055; }
    .view-btn { background: #00d4ff; color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

<div class="admin-container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h2 style="color: #00d4ff; letter-spacing: 2px;">SYSTEM ADMINISTRATION <span style="color:white">PORTAL</span></h2>
    <button onclick="location.reload()" style="background: transparent; border: 1px solid #00d4ff; color: #00d4ff; padding: 10px; cursor:pointer;">REFRESH SYSTEM</button>
  </div>

  <table>
    <thead>
    <tr>
      <th>UID</th>
      <th>User Email</th>
      <th>Role</th>
      <th>Status</th>
      <th>Vault Access</th>
    </tr>
    </thead>
    <tbody id="userTable">
    </tbody>
  </table>
</div>

<script>
  async function loadAllUsers() {
      const res = await fetch('/api/admin/all-users'); // Apni admin API call karein
      const users = await res.json();
      const table = document.getElementById('userTable');
      table.innerHTML = '';

      users.forEach(u => {
          table.innerHTML += `
              <tr class="user-row">
                  <td>#${u.id}</td>
                  <td>${u.email}</td>
                  <td style="color: #777;">${u.role}</td>
                  <td><span class="status-badge">ACTIVE</span></td>
                  <td><button class="view-btn" onclick="viewUserGallery(${u.id})">VIEW DATA</button></td>
              </tr>`;
      });
  }

  function viewUserGallery(id) {
      alert("Accessing Vault for User ID: " + id);
      // Yahan aap user ki specific gallery khulne ka logic daal sakte hain
  }

  window.onload = loadAllUsers;
</script>
</body>
</html>
