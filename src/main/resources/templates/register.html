<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyber Register - Join Vault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Ubuntu', sans-serif; }
    body { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); color: white; }
    .container { width: 380px; background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 25px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    h2 { color: #00d4ff; margin-bottom: 25px; letter-spacing: 2px; }
    input { width: 100%; padding: 12px 20px; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 50px; color: #fff; outline: none; margin-bottom: 15px; }
    input:focus { border-color: #00d4ff; }
    button { width: 100%; padding: 12px; border-radius: 50px; border: none; background: #00d4ff; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
    button:hover { background: #fff; transform: scale(1.05); }
    .back { margin-top: 15px; font-size: 0.8rem; color: #777; }
    .back a { color: #00d4ff; text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <h2>CREATE ACCOUNT</h2>
  <form action="/register" method="POST">
    <input type="text" name="username" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="password" name="password" placeholder="Create Password" required>
    <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
    <button type="submit">JOIN THE VAULT</button>
  </form>
  <div class="back">Already a member? <a href="/login">Login here</a></div>
</div>
</body>
</html>
